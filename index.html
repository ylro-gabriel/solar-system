<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Solar System</title>
  </head>
  <body>
    <div class="space">
      <div class="sun">
        <img
          src="https://media3.giphy.com/media/v1.Y2lkPTZjMDliOTUyYjVvbG93ankyN2Jjb25heGEwY3BvdHgzMjF5ZWJodjd3ZzY0d2g4eCZlcD12MV9zdGlja2Vyc19zZWFyY2gmY3Q9cw/YqL7wobl36TXvw4SxO/200.gif"
          alt="sun"
          id="sun"
        />
      </div>
      <div class="mercury-orbit">
        <img
          src="https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUyMTY5eGp4Z3p4bWlpc2JhdnF2NnY1OXI4OXdncndzcnp3NW9yczM1cSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/l0HlO4V8iCRME3i0g/giphy.gif"
          alt="mercury"
          id="mercury"
        />
      </div>
      <div class="venus-orbit">
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/0/0e/Venus_Rotation_Movie.gif"
          alt="venus"
          id="venus"
        />
      </div>
      <div class="earth-orbit">
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/e/e1/Rotating_earth_animated.gif"
          alt="earth"
          id="earth"
        />
      </div>
      <div class="mars-orbit">
        <div class="mars">
          <img
            src="https://mir-s3-cdn-cf.behance.net/project_modules/fs/573633121359165.60c3f5cc6b35e.gif"
            alt="mars"
            id="mars"
          />
        </div>
      </div>
      <div class="jupiter-orbit">
        <div class="jupiter">
          <img
            src="https://media1.giphy.com/media/v1.Y2lkPTZjMDliOTUybWVkZWhxZnJvcHQzYWo5ZTM3ZHZyZmN0Y21na3hxY255bTM2dWU1OCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/s2uampOAMWksU/giphy.gif"
            alt="jupiter"
            id="jupiter"
          />
        </div>
      </div>
      <div class="saturn-orbit">
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/f/fe/Saturnoppositions-animated.gif"
          alt="saturn"
          id="saturn"
        />
      </div>
      <div class="uranus-orbit">
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/1/1b/Uranus_JWST_infrared_rotation.gif"
          alt="uranus"
          id="uranus"
        />
      </div>
      <div class="neptune-orbit">
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/6/6d/Neptune.gif"
          alt="neptune"
          id="neptune"
        />
      </div>
    </div>
  </body>
</html>
